server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: study-room-booking
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.studyroom.booking.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: '用户与权限'
      paths-to-match:
        - '/auth/**'
        - '/users/**'
    - group: '空间管理'
      paths-to-match:
        - '/campuses/**'
        - '/buildings/**'
        - '/floors/**'
        - '/rooms/**'
        - '/seats/**'
    - group: '预约核心'
      paths-to-match:
        - '/reservations/**'
    - group: '座位管控'
      paths-to-match:
        - '/checkin/**'
        - '/checkout/**'
        - '/temporary-leave/**'
        - '/return-seat/**'
        - '/blacklist/**'
        - '/no-show-records/**'
    - group: '数据报表'
      paths-to-match:
        - '/reports/**'
        - '/dashboard/**'

knife4j:
  enable: true
  setting:
    language: zh_cn
