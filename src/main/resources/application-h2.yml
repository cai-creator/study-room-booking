spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:study_room_booking;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

jwt:
  secret: study-room-booking-secret-key-2024-very-long-secret-for-jwt-token
  expire: 86400000
  header: Authorization
  prefix: Bearer

booking:
  rules:
    max-daily-reservations: 3
    max-duration-hours: 8
    advance-booking-hours: 24
    min-advance-minutes: 15
    checkin-grace-minutes: 15
    booking-reminder-minutes: 15
    temporary-absence-minutes: 30
    blacklist-threshold: 3
    blacklist-days: 7

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl