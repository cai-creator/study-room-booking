spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_room_booking?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

jwt:
  secret: study-room-booking-secret-key-2024-very-long-secret-for-jwt-token
  expire: 86400000
  header: Authorization
  prefix: Bearer

booking:
  rules:
    max-daily-reservations: 3
    max-duration-hours: 8
    advance-booking-hours: 24
    min-advance-minutes: -50
    checkin-grace-minutes: 50
    checkin-deadline-minutes: 10
    booking-reminder-minutes: 15
    temporary-absence-minutes: 30
    blacklist-threshold: 3
    blacklist-days: 7
