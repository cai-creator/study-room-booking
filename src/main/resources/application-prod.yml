spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/study_room_booking?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expire: 86400000
  header: Authorization
  prefix: Bearer

booking:
  rules:
    max-daily-reservations: 3
    max-duration-hours: 8
    advance-booking-hours: 24
    min-advance-minutes: -50
    checkin-grace-minutes: 50
    checkin-deadline-minutes: 10
    booking-reminder-minutes: 15
    temporary-absence-minutes: 30
    blacklist-threshold: 3
    blacklist-days: 7

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 生产环境关闭 API 文档
knife4j:
  enable: false
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
