<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智约自习</title>
    <link rel="stylesheet" href="../colors_and_type.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-primary: var(--brand-primary);
      }
      @layer base {
        body { background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font-family); }
      }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--brand-primary-lightest) 100%);">

<!-- ===== 登录/注册卡片 ===== -->
<div class="w-full max-w-md" style="background: var(--surface-card); border: var(--surface-card-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
  <div class="p-8 sm:p-10">

    <!-- 已登录提示条 -->
    <div id="logged-in-banner" class="hidden mb-6 px-4 py-3 rounded-md text-sm flex items-center justify-between gap-2"
         style="background: var(--state-info-bg); color: var(--state-info); border: 1px solid rgba(37, 99, 235, 0.2);">
      <div class="flex items-center gap-2">
        <i data-lucide="user-check" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
        <span id="logged-in-text">您已登录</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="continueAsLoggedIn()"
                class="px-3 py-1 text-xs font-medium rounded-md transition-all"
                style="background: var(--state-info); color: #fff;">
          继续进入
        </button>
        <button onclick="switchAccount()"
                class="px-3 py-1 text-xs font-medium rounded-md transition-all"
                style="background: transparent; color: var(--state-info); border: 1px solid var(--state-info);">
          切换账号
        </button>
      </div>
    </div>

    <!-- Logo/品牌区 -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: var(--brand-primary-lighter);">
        <i data-lucide="book-open" style="width: 28px; height: 28px; color: var(--brand-primary);"></i>
      </div>
      <h1 id="page-title" style="font-size: var(--text-2xl); font-weight: 700; color: var(--color-text-primary); letter-spacing: var(--tracking-tight);">智约自习</h1>
      <p id="page-subtitle" style="font-size: var(--text-sm); color: var(--color-text-tertiary); margin-top: 4px;">高校智能预约系统</p>
    </div>

    <!-- ===== 模式切换入口（登录 <-> 注册） ===== -->
    <div class="text-right mb-4">
      <a id="switch-mode-link" href="javascript:void(0);" onclick="toggleMode()"
         class="text-xs font-medium hover:underline" style="color: var(--brand-primary);">
        <i data-lucide="user-plus" class="inline align-text-bottom mr-1" style="width: 13px; height: 13px;"></i>
        没有账号？立即注册
      </a>
    </div>

    <!-- ===== 登录模式：身份切换 Tab ===== -->
    <div id="login-tabs" class="flex rounded-lg mb-5 p-1" style="background: var(--color-bg-tertiary);">
      <button id="tab-student" onclick="switchTab('student')"
              class="flex-1 py-2 text-sm font-medium rounded-md transition-all flex items-center justify-center gap-1.5"
              style="background: var(--color-surface); color: var(--color-text-primary); box-shadow: var(--shadow-sm);">
        <i data-lucide="graduation-cap" style="width:15px;height:15px;"></i>
        学生登录
      </button>
      <button id="tab-admin" onclick="switchTab('admin')"
              class="flex-1 py-2 text-sm font-medium rounded-md transition-all flex items-center justify-center gap-1.5"
              style="background: transparent; color: var(--color-text-tertiary);">
        <i data-lucide="shield-user" style="width:15px;height:15px;"></i>
        管理员登录
      </button>
    </div>

    <!-- 身份/注册说明文字 -->
    <div id="tab-hint" class="mb-4 text-center text-xs" style="color: var(--color-text-tertiary);">
      请使用您的学号和密码进行登录
    </div>

    <!-- 错误提示 -->
    <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded-md text-sm flex items-center gap-2" style="background: var(--state-error-bg); color: var(--state-error);">
      <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
      <span id="error-text"></span>
    </div>

    <!-- ===== 账号密码登录表单 ===== -->
    <form id="form-password" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);"><span id="label-username">用户名 / 学号</span></label>
        <div class="relative">
          <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="username" type="text" autocomplete="username" placeholder="请输入用户名或学号"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">密码</label>
        <div class="relative">
          <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>

      <button type="submit" id="btn-login"
              class="w-full py-2.5 text-sm font-semibold rounded-md transition-all flex items-center justify-center gap-2"
              style="background: var(--brand-primary); color: var(--color-text-inverse);">
        <span id="btn-text">登 录</span>
        <i id="btn-spinner" data-lucide="loader-2" class="hidden animate-spin" style="width: 16px; height: 16px;"></i>
      </button>
    </form>

    <!-- ===== 注册表单（默认隐藏） ===== -->
    <form id="form-register" onsubmit="handleRegister(event)" class="space-y-3 hidden">
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">用户名 / 学号 <span style="color: var(--state-error);">*</span></label>
        <div class="relative">
          <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-username" type="text" placeholder="请输入学号或用户名"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">真实姓名 <span style="color: var(--state-error);">*</span></label>
        <div class="relative">
          <i data-lucide="id-card" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-realname" type="text" placeholder="请输入您的真实姓名"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">密码 <span style="color: var(--state-error);">*</span></label>
        <div class="relative">
          <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-password" type="password" placeholder="至少6位，建议包含字母和数字"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">确认密码 <span style="color: var(--state-error);">*</span></label>
        <div class="relative">
          <i data-lucide="shield-check" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-password2" type="password" placeholder="请再次输入密码"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">邮箱（可选，用于找回密码）</label>
        <div class="relative">
          <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-email" type="email" placeholder="例如 name@school.edu.cn"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>
      <div>
        <label class="block mb-1.5 text-sm font-medium" style="color: var(--color-text-secondary);">手机号（可选）</label>
        <div class="relative">
          <i data-lucide="smartphone" class="absolute left-3 top-1/2 -translate-y-1/2" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
          <input id="r-phone" type="tel" maxlength="11" placeholder="11位手机号码"
                 class="w-full pl-10 pr-4 py-2.5 text-sm rounded-md outline-none transition-all"
                 style="border: 1px solid var(--color-border); background: var(--color-bg); color: var(--color-text-primary);">
        </div>
      </div>

      <button type="submit" id="btn-register"
              class="w-full py-2.5 text-sm font-semibold rounded-md transition-all flex items-center justify-center gap-2 mt-5"
              style="background: var(--brand-primary); color: var(--color-text-inverse);">
        <span id="btn-register-text">提交注册</span>
        <i id="btn-register-spinner" data-lucide="loader-2" class="hidden animate-spin" style="width: 16px; height: 16px;"></i>
      </button>
      <p class="text-center" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">
        <i data-lucide="info" class="inline align-text-bottom mr-1" style="width: 12px; height: 12px;"></i>
        自注册的账号默认为学生身份，管理员账号请联系系统管理员分配
      </p>
    </form>

    <!-- 底部版权 -->
    <p class="text-center mt-6" style="font-size: var(--text-xs); color: var(--color-text-tertiary);">
      © 2026 智约自习 · 高校自习室智能预约系统
    </p>
  </div>
</div>

<!-- ===== Toast 容器 ===== -->
<div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

<!-- ===== 脚本 ===== -->
<script src="./js/config.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/request.js"></script>
<script src="./api/auth.js"></script>

<script>
  'use strict';

  var currentTab = 'student';
  var currentMode = 'login'; // login | register

  // ===== 初始化 =====
  document.addEventListener('DOMContentLoaded', function () {
    lucide.createIcons();
    // 若已登录，自动按角色跳转到正确的首页（避免停留在登录页）
    if (Utils.redirectIfLoggedIn()) return;

    // 取出并显示角色不匹配 / 权限不足的提示（来自其他页面跳回时的缓存）
    var roleMsg = Utils.takeLoginMessage();
    if (roleMsg) showError(roleMsg);

    var token = Utils.getToken();
    var user = Utils.getUser();
    if (token && user) {
      showLoggedInBanner(user);
    }
    initInputStyles();
  });

  // ===== 模式切换（登录 <-> 注册） =====
  window.toggleMode = function () {
    var loginTabs = document.getElementById('login-tabs');
    var formLogin = document.getElementById('form-password');
    var formRegister = document.getElementById('form-register');
    var link = document.getElementById('switch-mode-link');
    var hint = document.getElementById('tab-hint');
    var title = document.getElementById('page-title');
    var subtitle = document.getElementById('page-subtitle');

    hideError();

    if (currentMode === 'login') {
      // 切到注册模式
      currentMode = 'register';
      loginTabs.classList.add('hidden');
      formLogin.classList.add('hidden');
      formRegister.classList.remove('hidden');
      link.innerHTML = '<i data-lucide="log-in" class="inline align-text-bottom mr-1" style="width:13px;height:13px;"></i>已有账号？返回登录';
      hint.textContent = '注册完成后默认获得学生身份，可直接登录预约';
      title.textContent = '注册新账号';
      subtitle.textContent = '填写以下信息完成学生账号注册';
      setRegisterLoading(false);
    } else {
      // 切回登录模式
      currentMode = 'login';
      loginTabs.classList.remove('hidden');
      formRegister.classList.add('hidden');
      formLogin.classList.remove('hidden');
      link.innerHTML = '<i data-lucide="user-plus" class="inline align-text-bottom mr-1" style="width:13px;height:13px;"></i>没有账号？立即注册';
      title.textContent = '智约自习';
      subtitle.textContent = '高校智能预约系统';
      switchTab(currentTab); // 重新刷新身份提示
      setLoginLoading(false);
    }
    lucide.createIcons();
  };

  /** 显示已登录提示条 */
  function showLoggedInBanner(user) {
    var banner = document.getElementById('logged-in-banner');
    var text = document.getElementById('logged-in-text');
    var roleLabel = Utils.getStatusLabel(user.role, 'role') || '用户';
    text.textContent = '您已登录为 ' + roleLabel + '：' + (user.realName || user.username || '');
    banner.classList.remove('hidden');
    lucide.createIcons();
  }

  /** 以当前已登录身份继续进入系统 */
  window.continueAsLoggedIn = function () {
    var user = Utils.getUser();
    if (!user) {
      document.getElementById('logged-in-banner').classList.add('hidden');
      return;
    }
    redirectByRole(user.role);
  };

  /** 切换账号：清除登录态，隐藏提示条 */
  window.switchAccount = function () {
    Utils.clearToken();
    Utils.clearUser();
    document.getElementById('logged-in-banner').classList.add('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    Utils.showToast('已退出登录，请重新登录', 'info');
  };

  /** 输入框焦点高亮 */
  function initInputStyles() {
    var inputs = document.querySelectorAll('input');
    inputs.forEach(function (input) {
      input.addEventListener('focus', function () {
        this.style.borderColor = 'var(--brand-primary)';
        this.style.boxShadow = '0 0 0 3px var(--brand-primary-lighter)';
      });
      input.addEventListener('blur', function () {
        this.style.borderColor = 'var(--color-border)';
        this.style.boxShadow = 'none';
      });
      input.addEventListener('input', hideError);
    });
  }

  // ===== Tab 切换（学生 / 管理员） =====
  window.switchTab = function (tab) {
    currentTab = tab;
    var tabStudent = document.getElementById('tab-student');
    var tabAdmin = document.getElementById('tab-admin');
    var hint = document.getElementById('tab-hint');
    var labelUsername = document.getElementById('label-username');
    var usernameInput = document.getElementById('username');

    hideError();

    if (tab === 'student') {
      tabStudent.style.background = 'var(--color-surface)';
      tabStudent.style.color = 'var(--color-text-primary)';
      tabStudent.style.boxShadow = 'var(--shadow-sm)';
      tabAdmin.style.background = 'transparent';
      tabAdmin.style.color = 'var(--color-text-tertiary)';
      tabAdmin.style.boxShadow = 'none';
      hint.textContent = '请使用您的学号和密码进行登录';
      labelUsername.textContent = '用户名 / 学号';
      usernameInput.placeholder = '请输入用户名或学号';
    } else {
      tabAdmin.style.background = 'var(--color-surface)';
      tabAdmin.style.color = 'var(--color-text-primary)';
      tabAdmin.style.boxShadow = 'var(--shadow-sm)';
      tabStudent.style.background = 'transparent';
      tabStudent.style.color = 'var(--color-text-tertiary)';
      tabStudent.style.boxShadow = 'none';
      hint.textContent = '管理员请使用分配的管理账号登录';
      labelUsername.textContent = '管理员账号';
      usernameInput.placeholder = '请输入管理员账号';
    }
    lucide.createIcons();
  };

  // ===== 账号密码登录 =====
  window.handleLogin = function (event) {
    event.preventDefault();
    hideError();

    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;

    if (!username) { showError('请输入' + (currentTab === 'student' ? '用户名或学号' : '管理员账号')); return; }
    if (!password) { showError('请输入密码'); return; }

    setLoginLoading(true);

    var expectedRole = currentTab === 'student' ? 'STUDENT' : 'ADMIN';
    AuthAPI.login(username, password, expectedRole)
      .then(function (data) {
        setLoginLoading(false);
      })
      .catch(function (err) {
        setLoginLoading(false);
        showError(err.message || '登录失败，请稍后重试');
      });
  };

  // ===== 注册提交 =====
  window.handleRegister = function (event) {
    event.preventDefault();
    hideError();

    var username = document.getElementById('r-username').value.trim();
    var realName = document.getElementById('r-realname').value.trim();
    var password = document.getElementById('r-password').value;
    var password2 = document.getElementById('r-password2').value;
    var email = document.getElementById('r-email').value.trim();
    var phone = document.getElementById('r-phone').value.trim();

    // 必填校验
    if (!username) { showError('请输入用户名/学号'); return; }
    if (username.length < 3) { showError('用户名/学号至少3个字符'); return; }
    if (!realName) { showError('请输入真实姓名'); return; }
    if (!password) { showError('请输入密码'); return; }
    if (password.length < 6) { showError('密码至少需要6位'); return; }
    if (password !== password2) { showError('两次输入的密码不一致'); return; }

    // 可选字段格式校验（填了才校验）
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('邮箱格式不正确'); return; }
    if (phone && !/^1\d{10}$/.test(phone)) { showError('手机号格式不正确，须为1开头的11位数字'); return; }

    setRegisterLoading(true);

    AuthAPI.register({
      username: username,
      password: password,
      realName: realName,
      email: email || undefined,
      phone: phone || undefined,
    })
      .then(function () {
        setRegisterLoading(false);
        Utils.showToast('注册成功，请使用新账号登录', 'success');
        // 切回登录tab，预填用户名
        document.getElementById('username').value = username;
        document.getElementById('password').value = '';
        // 清空注册表单，避免返回还有值
        document.getElementById('r-username').value = '';
        document.getElementById('r-realname').value = '';
        document.getElementById('r-password').value = '';
        document.getElementById('r-password2').value = '';
        document.getElementById('r-email').value = '';
        document.getElementById('r-phone').value = '';
        toggleMode(); // 切回登录
      })
      .catch(function (err) {
        setRegisterLoading(false);
        showError(err.message || '注册失败，请稍后重试');
      });
  };

  // ===== 辅助函数 =====
  function redirectByRole(role) {
    if (role === 'STUDENT') {
      window.location.href = BasePath.student + '/pages/home.html';
    } else {
      window.location.href = BasePath.admin + '/pages/space-management.html';
    }
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.remove('hidden');
    lucide.createIcons();
  }

  function hideError() {
    document.getElementById('error-msg').classList.add('hidden');
  }

  function setLoginLoading(loading) {
    var btn = document.getElementById('btn-login');
    var text = document.getElementById('btn-text');
    var spinner = document.getElementById('btn-spinner');
    if (loading) {
      btn.disabled = true;
      btn.style.opacity = '0.7';
      btn.style.cursor = 'not-allowed';
      text.textContent = '登录中...';
      spinner.classList.remove('hidden');
    } else {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      text.textContent = '登 录';
      spinner.classList.add('hidden');
    }
    lucide.createIcons();
  }

  function setRegisterLoading(loading) {
    var btn = document.getElementById('btn-register');
    var text = document.getElementById('btn-register-text');
    var spinner = document.getElementById('btn-register-spinner');
    if (loading) {
      btn.disabled = true;
      btn.style.opacity = '0.7';
      btn.style.cursor = 'not-allowed';
      text.textContent = '注册中...';
      spinner.classList.remove('hidden');
    } else {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      text.textContent = '提交注册';
      spinner.classList.add('hidden');
    }
    lucide.createIcons();
  }
</script>
</body>
</html>
