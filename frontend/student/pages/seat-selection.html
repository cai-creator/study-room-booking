<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位预约 - 智约自习</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style type="text/tailwindcss">
    @theme inline { --color-primary: var(--brand-primary); }
    @layer base {
      body { background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font-family); }
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--color-bg-secondary);">
  <div id="navbar-placeholder"></div>

  <main class="mx-auto px-4 sm:px-6 py-6" style="max-width: var(--max-width);">
    <div class="flex items-center gap-3 mb-4">
      <a href="home.html" class="flex items-center gap-1 text-sm transition-colors" style="color:var(--brand-primary);text-decoration:none;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 返回首页
      </a>
      <span class="text-sm" style="color:var(--color-text-tertiary);">/</span>
      <h1 class="text-xl font-bold">座位预约</h1>
    </div>

    <!-- 自习室选择器（如果没有roomId） -->
    <div id="room-selector" class="mb-4 hidden">
      <label class="text-sm font-medium mb-2 block" style="color:var(--color-text-secondary);">选择自习室</label>
      <select id="room-select" class="px-3 py-2 rounded-md text-sm outline-none w-full md:w-80"
              style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
        <option value="">请选择自习室</option>
      </select>
    </div>

    <!-- 自习室信息 -->
    <div id="room-info" class="rounded-xl p-4 mb-4 hidden" style="background: var(--surface-card); border: var(--surface-card-border);">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <h1 class="text-lg font-bold" id="room-name">--</h1>
          <p class="text-xs mt-0.5" style="color:var(--color-text-tertiary);" id="room-location">--</p>
        </div>
        <div class="flex items-center gap-4 text-xs">
          <span>总座位: <strong id="stat-total">0</strong></span>
          <span style="color:var(--seat-available);">空闲: <strong id="stat-available">0</strong></span>
          <span style="color:var(--seat-reserved);">已预约: <strong id="stat-reserved">0</strong></span>
          <span style="color:var(--seat-occupied);">使用中: <strong id="stat-occupied">0</strong></span>
        </div>
      </div>
    </div>

    <!-- 状态图例 -->
    <div class="rounded-xl p-3 mb-4 flex items-center gap-4 flex-wrap" style="background: var(--surface-card); border: var(--surface-card-border);">
      <span class="text-xs font-medium" style="color:var(--color-text-secondary);">图例：</span>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-available);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">空闲</span></div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-reserved);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">已预约</span></div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-occupied);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">使用中</span></div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-away);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">暂离</span></div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--color-border);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">不可用</span></div>
    </div>

    <!-- 座位网格 -->
    <div id="seat-loading" class="py-12 text-center text-sm" style="color:var(--color-text-tertiary);">加载中...</div>
    <div id="seat-grid-container" class="hidden rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
      <div class="text-center text-xs mb-3" style="color:var(--color-text-tertiary);">讲台</div>
      <div id="seat-grid" class="flex flex-col items-center gap-1.5"></div>
    </div>

    <!-- 选中座位信息 -->
    <div id="seat-detail" class="hidden rounded-xl p-4" style="background: var(--surface-card); border: var(--surface-card-border);">
      <h3 class="font-semibold text-sm mb-3">座位信息</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <p class="text-sm mb-1">座位编号：<strong id="detail-code">--</strong></p>
          <p class="text-sm mb-1">状态：<span id="detail-status">--</span></p>
          <p class="text-sm" style="color:var(--color-text-tertiary);" id="detail-tags">--</p>
        </div>
        <div id="reservation-section">
          <label class="text-sm font-medium mb-2 block">预约日期</label>
          <input type="date" id="date-picker" class="px-3 py-2 rounded-md text-sm outline-none w-full md:w-48 mb-3"
                 style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <label class="text-sm font-medium mb-2 block">选择时段</label>
          <div id="slot-list" class="flex flex-wrap gap-2 mb-3"></div>
          <div id="slot-empty" class="hidden text-xs mb-3" style="color:var(--color-text-tertiary);">该日期暂无可用时段，请选择其他日期</div>
          <button onclick="makeReservation()" id="btn-reserve" class="px-5 py-2 rounded-md text-sm font-medium text-white"
                  style="background:var(--brand-primary);">确认预约</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../public/js/config.js"></script>
  <script src="../../public/js/utils.js"></script>
  <script src="../../public/js/request.js"></script>
  <script src="../../public/api/space.js"></script>
  <script src="../../public/api/reservation.js"></script>
  <script src="../../public/js/navbar.js"></script>

  <script>
    (function() {
      'use strict';

      if (!Utils.requireRole(['STUDENT'])) return;

      fetch('../partials/navbar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('navbar-placeholder').innerHTML = html;
          if (window.initNavbarUI) initNavbarUI();
          lucide.createIcons();
        });

      var currentRoomId = null;
      var selectedSeat = null;
      var selectedSlot = null;
      var seatStatusMap = { 'AVAILABLE': '空闲', 'RESERVED': '已预约', 'OCCUPIED': '使用中', 'TEMPORARY_LEAVE': '暂离', 'UNAVAILABLE': '不可用' };
      var statusColors = {
        'AVAILABLE': { bg: 'var(--seat-available)', text: '#fff' },
        'RESERVED': { bg: 'var(--seat-reserved)', text: '#fff' },
        'OCCUPIED': { bg: 'var(--seat-occupied)', text: '#fff' },
        'TEMPORARY_LEAVE': { bg: 'var(--seat-away)', text: '#fff' },
        'UNAVAILABLE': { bg: 'var(--color-border)', text: 'var(--color-text-tertiary)' }
      };

      // 从URL获取roomId
      var urlParams = new URLSearchParams(window.location.search);
      var roomIdFromUrl = urlParams.get('roomId');

      if (roomIdFromUrl) {
        currentRoomId = Number(roomIdFromUrl);
        loadRoomInfo(currentRoomId);
        loadSeats(currentRoomId);
      } else {
        // 显示自习室选择器
        document.getElementById('room-selector').classList.remove('hidden');
        document.getElementById('seat-loading').classList.add('hidden');
        SpaceAPI.getRooms({ pageSize: 100 }).then(function(result) {
          var sel = document.getElementById('room-select');
          var list = result.records || result.list || [];
          list.forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.id; opt.textContent = r.name;
            sel.appendChild(opt);
          });
          sel.addEventListener('change', function() {
            if (this.value) {
              currentRoomId = Number(this.value);
              loadRoomInfo(currentRoomId);
              loadSeats(currentRoomId);
            }
          });
        });
      }

      function loadRoomInfo(roomId) {
        SpaceAPI.getRoom(roomId).then(function(room) {
          if (room) {
            document.getElementById('room-name').textContent = room.name;
            document.getElementById('room-location').textContent = room.campusName + ' · ' + room.buildingName + ' · ' + room.floorNumber + '层';
            document.getElementById('room-info').classList.remove('hidden');
          }
        });
      }

      function loadSeats(roomId) {
        document.getElementById('seat-loading').classList.remove('hidden');
        document.getElementById('seat-grid-container').classList.add('hidden');
        document.getElementById('seat-detail').classList.add('hidden');
        selectedSeat = null; selectedSlot = null;

        SpaceAPI.getSeatStatus(roomId).then(function(data) {
          document.getElementById('seat-loading').classList.add('hidden');
          document.getElementById('seat-grid-container').classList.remove('hidden');
          document.getElementById('stat-total').textContent = data.totalSeats;
          document.getElementById('stat-available').textContent = data.availableSeats;
          document.getElementById('stat-reserved').textContent = data.reservedSeats;
          document.getElementById('stat-occupied').textContent = data.occupiedSeats;

          var grid = document.getElementById('seat-grid');
          grid.innerHTML = '';
          var seats = data.seats || [];
          var seatsByRow = {};
          seats.forEach(function(s) {
            if (!seatsByRow[s.rowNumber]) seatsByRow[s.rowNumber] = [];
            seatsByRow[s.rowNumber].push(s);
          });

          Object.keys(seatsByRow).sort(function(a,b){return a-b;}).forEach(function(rowNum) {
            var rowDiv = document.createElement('div');
            rowDiv.className = 'flex gap-1.5';
            seatsByRow[rowNum].forEach(function(seat) {
              var btn = document.createElement('button');
              btn.className = 'w-9 h-9 rounded text-xs font-medium transition-all flex items-center justify-center';
              var sc = statusColors[seat.status] || statusColors['UNAVAILABLE'];
              btn.style.cssText = 'background:' + sc.bg + ';color:' + sc.text + ';border:none;cursor:pointer;';
              btn.textContent = seat.seatCode;
              btn.title = seat.seatCode + ' - ' + seatStatusMap[seat.status];
              if (seat.status === 'AVAILABLE') {
                btn.onclick = function() { selectSeat(seat); };
              }
              rowDiv.appendChild(btn);
            });
            grid.appendChild(rowDiv);
          });
        }).catch(function() {
          document.getElementById('seat-loading').textContent = '加载失败';
        });
      }

      function loadSlotsForDate(seat, dateStr) {
        selectedSlot = null;
        document.getElementById('slot-empty').classList.add('hidden');
        ReservationAPI.getAvailableSlots(seat.seatId, dateStr).then(function(slots) {
          var container = document.getElementById('slot-list');
          container.innerHTML = '';
          if (!slots || slots.length === 0) {
            document.getElementById('slot-empty').classList.remove('hidden');
            return;
          }
          slots.forEach(function(slot) {
            var btn = document.createElement('button');
            btn.className = 'px-3 py-1.5 rounded-md text-xs font-medium transition-all';
            btn.style.cssText = 'background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:pointer;';
            btn.textContent = Utils.formatTime(slot.startTime) + '-' + Utils.formatTime(slot.endTime);
            btn.onclick = function() {
              selectedSlot = slot;
              Array.from(container.children).forEach(function(c) {
                c.style.cssText = 'background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:pointer;';
              });
              btn.style.cssText = 'background:var(--brand-primary);color:var(--color-text-inverse);border:1px solid var(--brand-primary);cursor:pointer;';
            };
            container.appendChild(btn);
          });
        }).catch(function() {
          document.getElementById('slot-empty').classList.remove('hidden');
        });
      }

      function selectSeat(seat) {
        selectedSeat = seat;
        selectedSlot = null;
        document.getElementById('seat-detail').classList.remove('hidden');
        document.getElementById('detail-code').textContent = seat.seatCode;
        var st = statusColors[seat.status] || statusColors['UNAVAILABLE'];
        document.getElementById('detail-status').innerHTML = '<span style="color:' + st.bg + ';font-weight:600;">' + seatStatusMap[seat.status] + '</span>';
        var tagText = (seat.tags || []).join('、') || '无特殊标签';
        document.getElementById('detail-tags').textContent = '标签：' + tagText;

        // 初始化日期选择器（默认明天）
        var datePicker = document.getElementById('date-picker');
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        datePicker.value = tomorrow.toISOString().slice(0, 10);
        datePicker.min = new Date().toISOString().slice(0, 10);

        // 监听日期变化
        datePicker.onchange = function() {
          if (this.value) {
            loadSlotsForDate(selectedSeat, this.value);
          }
        };

        // 加载默认日期的时段
        loadSlotsForDate(seat, datePicker.value);
      }

      window.makeReservation = function() {
        if (!selectedSeat || !selectedSlot) {
          Utils.showToast('请选择时段', 'warning');
          return;
        }
        ReservationAPI.createReservation({
          seatId: selectedSeat.seatId,
          startTime: selectedSlot.startTime,
          endTime: selectedSlot.endTime
        }).then(function() {
          Utils.showToast('预约成功！', 'success');
          loadSeats(currentRoomId);
        }).catch(function(err) {
          Utils.showToast(err.message || '预约失败', 'error');
        });
      };
    })();
  </script>
</body>
</html>
