<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位预约 - 智约自习</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style type="text/tailwindcss">
    @theme inline { --color-primary: var(--brand-primary); }
    @layer base {
      body { background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font-family); }
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--color-bg-secondary);">
  <div id="navbar-placeholder"></div>

  <main class="mx-auto px-4 sm:px-6 py-6" style="max-width: var(--max-width);">
    <!-- 面包屑 -->
    <div class="flex items-center gap-3 mb-4">
      <a href="home.html" class="flex items-center gap-1 text-sm transition-colors" style="color:var(--brand-primary);text-decoration:none;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 返回首页
      </a>
      <span class="text-sm" style="color:var(--color-text-tertiary);">/</span>
      <h1 class="text-xl font-bold" id="page-title">座位预约</h1>
    </div>

    <!-- ========== 第一阶段：自习室列表 ========== -->
    <div id="room-section">
      <!-- 筛选栏 -->
      <div class="rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
          <select id="filter-campus" class="px-3 py-2 rounded-md text-sm outline-none"
                  style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
            <option value="">全部校区</option>
          </select>
          <select id="filter-building" class="px-3 py-2 rounded-md text-sm outline-none hidden"
                  style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
            <option value="">全部楼栋</option>
          </select>
          <select id="filter-floor" onchange="searchRooms()" class="px-3 py-2 rounded-md text-sm outline-none hidden"
                  style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
            <option value="">全部楼层</option>
          </select>
          <select id="filter-type" onchange="searchRooms()" class="px-3 py-2 rounded-md text-sm outline-none"
                  style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
            <option value="">全部类型</option>
            <option value="LIBRARY">图书馆</option>
            <option value="TEACHING">教学楼</option>
            <option value="READING">阅览室</option>
          </select>
          <div class="flex items-center gap-2 col-span-2 md:col-span-1">
            <input type="checkbox" id="filter-available" onchange="searchRooms()" class="w-4 h-4 rounded" style="accent-color:var(--brand-primary);">
            <label for="filter-available" class="text-sm" style="color:var(--color-text-secondary);">仅看有空座</label>
          </div>
          <div class="col-span-2 md:col-span-2 lg:col-span-1 flex gap-2">
            <input type="text" id="filter-keyword" placeholder="搜索自习室..." onkeypress="if(event.key==='Enter')searchRooms()"
                   class="flex-1 px-3 py-2 rounded-md text-sm outline-none"
                   style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
            <button onclick="searchRooms()" class="px-4 py-2 rounded-md text-sm font-medium text-white"
                    style="background:var(--brand-primary);">搜索</button>
          </div>
        </div>
      </div>

      <!-- 列表 -->
      <div id="rooms-loading" class="py-12 text-center text-sm" style="color:var(--color-text-tertiary);">加载中...</div>
      <div id="rooms-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
      <div id="rooms-empty" class="hidden py-12 text-center">
        <i data-lucide="search-x" style="width:40px;height:40px;color:var(--color-text-tertiary);margin:0 auto 8px;"></i>
        <p class="text-sm" style="color:var(--color-text-tertiary);">未找到符合条件的自习室</p>
      </div>

      <!-- 分页 -->
      <div id="pagination" class="hidden mt-6 flex items-center justify-center gap-2"></div>
    </div>

    <!-- ========== 第二阶段：座位选择 ========== -->
    <div id="seat-section" class="hidden">
      <!-- 返回自习室列表按钮 -->
      <button onclick="backToRoomList()" class="mb-4 flex items-center gap-1 text-sm transition-colors" style="color:var(--brand-primary);background:none;border:none;cursor:pointer;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 返回自习室列表
      </button>

      <!-- 自习室信息 -->
      <div id="room-info" class="rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
        <div class="flex items-center justify-between flex-wrap gap-2">
          <div>
            <h2 class="text-lg font-bold" id="room-name">--</h2>
            <p class="text-xs mt-0.5" style="color:var(--color-text-tertiary);" id="room-location">--</p>
          </div>
          <div class="flex items-center gap-4 text-xs">
            <span>开放时间: <strong id="room-hours">--</strong></span>
          </div>
        </div>
      </div>

      <!-- 日期和时段选择 -->
      <div id="time-selector" class="rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium mb-2 block" style="color:var(--color-text-secondary);">预约日期</label>
            <input type="date" id="date-picker" class="px-3 py-2 rounded-md text-sm outline-none w-full"
                   style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          </div>
          <div>
            <label class="text-sm font-medium mb-2 block" style="color:var(--color-text-secondary);">选择时段（可多选相邻时段）</label>
            <div id="slot-list" class="flex flex-wrap gap-2"></div>
            <div id="slot-hint" class="hidden text-xs mt-1" style="color:var(--brand-primary);">已选时段将以同一组预约提交，只需签到一次</div>
            <div id="slot-empty" class="hidden text-xs" style="color:var(--color-text-tertiary);">请先选择日期</div>
          </div>
        </div>
      </div>

      <!-- 状态图例 -->
      <div id="seat-legend" class="rounded-xl p-3 mb-4 flex items-center gap-4 flex-wrap" style="background: var(--surface-card); border: var(--surface-card-border);">
        <span class="text-xs font-medium" style="color:var(--color-text-secondary);">图例：</span>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-available);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">空闲</span></div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-reserved);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">已预约</span></div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-occupied);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">使用中</span></div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--seat-away);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">暂离</span></div>
        <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm" style="background:var(--color-border);"></span><span class="text-xs" style="color:var(--color-text-tertiary);">不可用</span></div>
      </div>

      <!-- 座位统计 -->
      <div id="seat-stats" class="rounded-xl p-3 mb-4 flex items-center gap-4 text-xs" style="background: var(--surface-card); border: var(--surface-card-border);">
        <span>总座位: <strong id="stat-total">0</strong></span>
        <span style="color:var(--seat-available);">空闲: <strong id="stat-available">0</strong></span>
        <span style="color:var(--seat-reserved);">已预约: <strong id="stat-reserved">0</strong></span>
        <span style="color:var(--seat-occupied);">使用中: <strong id="stat-occupied">0</strong></span>
      </div>

      <!-- 座位网格 -->
      <div id="seat-loading" class="py-12 text-center text-sm hidden" style="color:var(--color-text-tertiary);">请先选择时段</div>
      <div id="seat-grid-container" class="hidden rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
        <div class="text-center text-xs mb-3" style="color:var(--color-text-tertiary);">讲台</div>
        <div id="seat-grid" class="flex flex-col items-center gap-1.5"></div>
      </div>

      <!-- 选中座位信息和预约确认 -->
      <div id="seat-detail" class="hidden rounded-xl p-4" style="background: var(--surface-card); border: var(--surface-card-border);">
        <h3 class="font-semibold text-sm mb-3">预约确认</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <p class="text-sm mb-1">座位编号：<strong id="detail-code">--</strong></p>
            <p class="text-sm mb-1">状态：<span id="detail-status">--</span></p>
            <p class="text-sm" style="color:var(--color-text-tertiary);" id="detail-tags">--</p>
          </div>
          <div>
            <p class="text-sm mb-1">预约日期：<strong id="detail-date">--</strong></p>
            <p class="text-sm mb-3">预约时段：<strong id="detail-slot">--</strong></p>
            <button onclick="makeReservation()" id="btn-reserve" class="px-5 py-2 rounded-md text-sm font-medium text-white"
                    style="background:var(--brand-primary);">确认预约</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../../public/js/config.js"></script>
  <script src="../../public/js/utils.js"></script>
  <script src="../../public/js/request.js"></script>
  <script src="../../public/api/space.js"></script>
  <script src="../../public/api/reservation.js"></script>
  <script src="../../public/js/navbar.js"></script>

  <script>
    (function() {
      'use strict';

      if (!Utils.requireRole(['STUDENT'])) return;

      fetch('../partials/navbar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('navbar-placeholder').innerHTML = html;
          if (window.initNavbarUI) initNavbarUI();
          lucide.createIcons();
        });

      // ========== 共享状态 ==========
      var campuses = [], buildings = [], floors = [];
      var typeNames = { 'LIBRARY': '图书馆', 'TEACHING': '教学楼', 'READING': '阅览室' };
      var currentPage = 1;

      var currentRoomId = null;
      var currentRoom = null;
      var selectedDate = null;
      var selectedSlots = []; // 多时段选择，按时间排序
      var selectedSeat = null;
      var seatStatusMap = { 'AVAILABLE': '空闲', 'RESERVED': '已预约', 'OCCUPIED': '使用中', 'TEMPORARY_LEAVE': '暂离', 'UNAVAILABLE': '不可用' };
      var statusColors = {
        'AVAILABLE': { bg: 'var(--seat-available)', text: '#fff' },
        'RESERVED': { bg: 'var(--seat-reserved)', text: '#fff' },
        'OCCUPIED': { bg: 'var(--seat-occupied)', text: '#fff' },
        'TEMPORARY_LEAVE': { bg: 'var(--seat-away)', text: '#fff' },
        'UNAVAILABLE': { bg: 'var(--color-border)', text: 'var(--color-text-tertiary)' }
      };

      // ========== 自习室列表相关 ==========
      function resolveRoomLocation(room) {
        if (room.campusName && room.buildingName) {
          return { campusName: room.campusName, buildingName: room.buildingName, floorNumber: room.floorNumber || '' };
        }
        var floor = floors.find(function(f) { return f.id === room.floorId; });
        var building = floor ? buildings.find(function(b) { return b.id === floor.buildingId; }) : null;
        var campus = building ? campuses.find(function(c) { return c.id === building.campusId; }) : null;
        return {
          campusName: campus ? campus.name : (room.campusName || ''),
          buildingName: building ? building.name : (room.buildingName || ''),
          floorNumber: floor ? floor.floorNumber : (room.floorNumber || '')
        };
      }

      // 加载校区
      SpaceAPI.getCampuses().then(function(list) {
        campuses = list || [];
        var sel = document.getElementById('filter-campus');
        campuses.forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name;
          sel.appendChild(opt);
        });
      });

      // 加载楼栋 + 所有楼层
      SpaceAPI.getBuildings().then(function(list) {
        buildings = list || [];
        var fps = buildings.map(function(b) {
          return SpaceAPI.getFloors(b.id).catch(function() { return []; });
        });
        Promise.all(fps).then(function(res) {
          floors = [];
          res.forEach(function(f) { floors = floors.concat(f || []); });
        });
      });

      // 校区变化加载楼栋
      document.getElementById('filter-campus').addEventListener('change', function() {
        var cid = this.value;
        var selB = document.getElementById('filter-building');
        var selF = document.getElementById('filter-floor');
        selB.innerHTML = '<option value="">全部楼栋</option>';
        selF.innerHTML = '<option value="">全部楼层</option>';
        if (!cid) {
          selB.classList.add('hidden');
          selF.classList.add('hidden');
          searchRooms();
          return;
        }
        SpaceAPI.getBuildings({ campusId: cid }).then(function(list) {
          (list || []).forEach(function(b) {
            var opt = document.createElement('option');
            opt.value = b.id; opt.textContent = b.name;
            selB.appendChild(opt);
          });
          selB.classList.remove('hidden');
          searchRooms();
        });
      });

      // 楼栋变化加载楼层
      document.getElementById('filter-building').addEventListener('change', function() {
        var bid = this.value;
        var selF = document.getElementById('filter-floor');
        selF.innerHTML = '<option value="">全部楼层</option>';
        if (!bid) {
          selF.classList.add('hidden');
          searchRooms();
          return;
        }
        SpaceAPI.getFloors(bid).then(function(list) {
          (list || []).forEach(function(f) {
            var opt = document.createElement('option');
            opt.value = f.id; opt.textContent = f.floorNumber + '层';
            selF.appendChild(opt);
          });
          selF.classList.remove('hidden');
          searchRooms();
        });
      });

      window.searchRooms = function(page) {
        currentPage = page || 1;
        var params = { pageNum: currentPage, pageSize: 9 };
        var campusId = document.getElementById('filter-campus').value;
        var buildingId = document.getElementById('filter-building').value;
        var floorId = document.getElementById('filter-floor').value;
        var roomType = document.getElementById('filter-type').value;
        var hasAvailable = document.getElementById('filter-available').checked;
        var keyword = document.getElementById('filter-keyword').value.trim();

        if (campusId) params.campusId = campusId;
        if (buildingId) params.buildingId = buildingId;
        if (floorId) params.floorId = floorId;
        if (roomType) params.roomType = roomType;
        if (hasAvailable) params.hasAvailableSeats = true;
        if (keyword) params.keyword = keyword;

        document.getElementById('rooms-loading').classList.remove('hidden');
        document.getElementById('rooms-list').classList.add('hidden');
        document.getElementById('rooms-empty').classList.add('hidden');
        document.getElementById('pagination').classList.add('hidden');

        SpaceAPI.getRooms(params)
          .catch(function (err) {
            if (err && (err.code === 500 || err.code === 0)) {
              return { records: [], list: [], total: 0, _softFail: err.code };
            }
            throw err;
          })
          .then(function(result) {
            document.getElementById('rooms-loading').classList.add('hidden');
            document.getElementById('rooms-loading').textContent = '加载中...';
            var list = result.records || result.list || [];
            if (list.length === 0) {
              var empty = document.getElementById('rooms-empty');
              empty.classList.remove('hidden');
              if (result._softFail === 500) {
                empty.querySelector('p') && (empty.querySelector('p').textContent = '自习室服务暂不可用，请稍后重试');
              }
              lucide.createIcons();
              return;
            }
            var container = document.getElementById('rooms-list');
            container.innerHTML = '';
            container.classList.remove('hidden');
            list.forEach(function(room) {
              var loc = resolveRoomLocation(room);
              var el = document.createElement('div');
              el.className = 'rounded-xl p-5 transition-all hover:shadow-lg';
              el.style.cssText = 'background:var(--surface-card);border:var(--surface-card-border);';
              var availableCount = room.availableSeats != null ? room.availableSeats : (room.totalSeats ? Math.floor(room.totalSeats * 0.4) : 0);
              var statusBadge = (room.hasAvailable || availableCount > 0)
                ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--state-success-bg);color:var(--state-success);">有空座</span>'
                : '<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--seat-occupied-bg);color:var(--seat-occupied);">已满</span>';
              el.innerHTML =
                '<div class="flex items-start justify-between mb-3">' +
                  '<div>' +
                    '<h3 class="font-semibold text-sm mb-1">' + Utils.escapeHtml(room.name) + '</h3>' +
                    '<p class="text-xs" style="color:var(--color-text-tertiary);">' + Utils.escapeHtml(loc.campusName) + ' · ' + Utils.escapeHtml(loc.buildingName) + ' · ' + loc.floorNumber + '层</p>' +
                  '</div>' +
                  statusBadge +
                '</div>' +
                '<div class="flex items-center gap-4 text-xs mb-4" style="color:var(--color-text-secondary);">' +
                  '<span><i data-lucide="users" class="inline" style="width:12px;height:12px;"></i> ' + room.totalSeats + '座</span>' +
                  '<span><i data-lucide="layout-grid" class="inline" style="width:12px;height:12px;"></i> ' + room.rowsCount + '×' + room.colsCount + '</span>' +
                  '<span class="px-2 py-0.5 rounded-full" style="background:var(--color-bg-tertiary);">' + (typeNames[room.roomType] || room.roomType) + '</span>' +
                '</div>' +
                '<button onclick="enterSeatSelection(' + room.id + ')" class="block w-full text-center py-2 rounded-md text-sm font-medium transition-all" ' +
                   'style="background:var(--brand-primary);color:var(--color-text-inverse);border:none;cursor:pointer;">进入选座</button>';
              container.appendChild(el);
            });
            renderPagination(result.total || 0, result.current || result.pageNum || 1, result.size || result.pageSize || 9);
            lucide.createIcons();
          }).catch(function(e) {
            document.getElementById('rooms-loading').classList.add('hidden');
            document.getElementById('rooms-loading').textContent = '加载中...';
            var empty = document.getElementById('rooms-empty');
            empty.classList.remove('hidden');
            empty.querySelector('p') && (empty.querySelector('p').textContent = (e && e.message) || '加载失败，请重试');
          });
      };

      function renderPagination(total, pageNum, pageSize) {
        var totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) return;
        var container = document.getElementById('pagination');
        container.innerHTML = '';
        container.classList.remove('hidden');
        for (var i = 1; i <= totalPages; i++) {
          var btn = document.createElement('button');
          btn.textContent = i;
          btn.className = 'w-8 h-8 rounded-md text-sm font-medium transition-all';
          if (i === pageNum) {
            btn.style.cssText = 'background:var(--brand-primary);color:var(--color-text-inverse);';
          } else {
            btn.style.cssText = 'background:var(--color-bg);color:var(--color-text-secondary);border:1px solid var(--color-border);';
          }
          btn.onclick = (function(p) { return function() { window.searchRooms(p); }; })(i);
          container.appendChild(btn);
        }
      }

      // ========== 座位选择相关 ==========
      window.enterSeatSelection = function(roomId) {
        currentRoomId = roomId;
        document.getElementById('room-section').classList.add('hidden');
        document.getElementById('seat-section').classList.remove('hidden');
        document.getElementById('page-title').textContent = '选座预约';
        initRoom(roomId);
        window.scrollTo(0, 0);
      };

      window.backToRoomList = function() {
        document.getElementById('seat-section').classList.add('hidden');
        document.getElementById('room-section').classList.remove('hidden');
        document.getElementById('page-title').textContent = '座位预约';
        currentRoomId = null;
        currentRoom = null;
        selectedSlots = [];
        selectedSeat = null;
        window.scrollTo(0, 0);
      };

      function initRoom(roomId) {
        SpaceAPI.getRoom(roomId).then(function(room) {
          currentRoom = room;
          document.getElementById('room-name').textContent = room.name;
          document.getElementById('room-location').textContent = room.campusName + ' · ' + room.buildingName + ' · ' + room.floorNumber + '层';
          document.getElementById('room-hours').textContent = (room.openTime || '08:00:00').slice(0, 5) + ' - ' + (room.closeTime || '22:00:00').slice(0, 5);

          // 初始化日期选择器（今天到后天，共3天）
          var datePicker = document.getElementById('date-picker');
          var today = new Date();
          var todayStr = today.toISOString().slice(0, 10);
          var dayAfterTomorrow = new Date();
          dayAfterTomorrow.setDate(dayAfterTomorrow.getDate() + 2);
          var dayAfterTomorrowStr = dayAfterTomorrow.toISOString().slice(0, 10);

          // 默认选今天，若今天时段全过期则尝试明天
          var now = new Date();
          var currentMinutes = now.getHours() * 60 + now.getMinutes();
          var closeTimeStr = (currentRoom.closeTime || '22:00:00');
          var closeMinutes = parseInt(closeTimeStr.split(':')[0]) * 60 + parseInt(closeTimeStr.split(':')[1]);
          if (currentMinutes >= closeMinutes - 50) {
            var tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            selectedDate = tomorrow.toISOString().slice(0, 10);
          } else {
            selectedDate = todayStr;
          }

          datePicker.value = selectedDate;
          datePicker.min = todayStr;
          datePicker.max = dayAfterTomorrowStr;

          datePicker.onchange = function() {
            if (this.value) {
              selectedDate = this.value;
              selectedSlots = [];
              selectedSeat = null;
              document.getElementById('seat-detail').classList.add('hidden');
              generateTimeSlots();
              document.getElementById('seat-grid-container').classList.add('hidden');
              document.getElementById('seat-loading').classList.remove('hidden');
              document.getElementById('seat-loading').textContent = '请选择时段';
            }
          };

          generateTimeSlots();
        });
      }

      function generateTimeSlots() {
        selectedSlots = [];
        selectedSeat = null;
        document.getElementById('seat-detail').classList.add('hidden');
        var container = document.getElementById('slot-list');
        container.innerHTML = '';

        if (!currentRoom || !selectedDate) {
          document.getElementById('slot-empty').classList.remove('hidden');
          return;
        }
        document.getElementById('slot-empty').classList.add('hidden');

        var openTime = currentRoom.openTime || '08:00:00';
        var closeTime = currentRoom.closeTime || '22:00:00';
        var openHour = parseInt(openTime.split(':')[0]);
        var closeHour = parseInt(closeTime.split(':')[0]);

        var todayStr = new Date().toISOString().slice(0, 10);
        var isToday = (selectedDate === todayStr);
        var now = new Date();
        var currentMinutes = now.getHours() * 60 + now.getMinutes();

        var slotData = []; // 保存所有可用时段数据
        for (var h = openHour; h < closeHour; h++) {
          if (isToday) {
            var slotStartMinutes = h * 60;
            if (currentMinutes >= slotStartMinutes + 50) continue;
          }
          var start = String(h).padStart(2, '0') + ':00';
          var end = String(h + 1).padStart(2, '0') + ':00';
          slotData.push({ start: start, end: end, hour: h });
        }

        if (slotData.length === 0) {
          document.getElementById('slot-empty').classList.remove('hidden');
          document.getElementById('slot-empty').textContent = '今日可选时段已结束，请选择其他日期';
          return;
        }

        // 创建时段按钮
        slotData.forEach(function(sd) {
          var btn = document.createElement('button');
          btn.className = 'px-3 py-1.5 rounded-md text-xs font-medium transition-all';
          btn.style.cssText = 'background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:pointer;';
          btn.textContent = sd.start + '-' + sd.end;
          btn.dataset.start = sd.start;
          btn.dataset.end = sd.end;
          btn.dataset.hour = sd.hour;
          btn.onclick = function() { toggleSlot(this, slotData); };
          container.appendChild(btn);
        });
      }

      function toggleSlot(btn, slotData) {
        var start = btn.dataset.start;
        var end = btn.dataset.end;
        var idx = selectedSlots.findIndex(function(s) { return s.startTime === start; });

        if (idx >= 0) {
          // 取消选中此时段
          selectedSlots.splice(idx, 1);
        } else {
          // 选中此时段
          selectedSlots.push({ startTime: start, endTime: end });
        }

        // 确保选中的时段是连续的：如果不连续，只保留最新点击的
        if (selectedSlots.length > 1) {
          selectedSlots.sort(function(a, b) { return a.startTime.localeCompare(b.startTime); });
          var continuous = true;
          for (var i = 1; i < selectedSlots.length; i++) {
            if (selectedSlots[i].startTime !== selectedSlots[i-1].endTime) {
              continuous = false;
              break;
            }
          }
          if (!continuous) {
            // 只保留最新点击的时段
            selectedSlots = [{ startTime: start, endTime: end }];
          }
        }

        // 更新按钮样式
        updateSlotButtons();

        // 更新提示
        var hintEl = document.getElementById('slot-hint');
        if (selectedSlots.length > 1) {
          hintEl.classList.remove('hidden');
        } else {
          hintEl.classList.add('hidden');
        }

        // 加载座位状态
        if (selectedSlots.length > 0) {
          loadSeatsByTime();
        } else {
          document.getElementById('seat-grid-container').classList.add('hidden');
          document.getElementById('seat-loading').classList.remove('hidden');
          document.getElementById('seat-loading').textContent = '请选择时段';
        }
      }

      function updateSlotButtons() {
        var container = document.getElementById('slot-list');
        Array.from(container.children).forEach(function(btn) {
          var isSelected = selectedSlots.some(function(s) { return s.startTime === btn.dataset.start; });
          if (isSelected) {
            btn.style.cssText = 'background:var(--brand-primary);color:var(--color-text-inverse);border:1px solid var(--brand-primary);cursor:pointer;';
          } else {
            btn.style.cssText = 'background:var(--color-bg-secondary);color:var(--color-text-secondary);border:1px solid var(--color-border);cursor:pointer;';
          }
        });
      }

      function loadSeatsByTime() {
        if (!currentRoomId || !selectedDate || selectedSlots.length === 0) return;

        document.getElementById('seat-loading').classList.remove('hidden');
        document.getElementById('seat-loading').textContent = '加载中...';
        document.getElementById('seat-grid-container').classList.add('hidden');
        document.getElementById('seat-detail').classList.add('hidden');
        selectedSeat = null;

        // 用第一个时段的开始和最后一个时段的结束来查询座位状态
        var firstSlot = selectedSlots[0];
        var lastSlot = selectedSlots[selectedSlots.length - 1];

        SpaceAPI.getSeatStatusByTime(currentRoomId, selectedDate, firstSlot.startTime, lastSlot.endTime)
          .then(function(data) {
            document.getElementById('seat-loading').classList.add('hidden');
            document.getElementById('seat-grid-container').classList.remove('hidden');
            document.getElementById('stat-total').textContent = data.totalSeats;
            document.getElementById('stat-available').textContent = data.availableSeats;
            document.getElementById('stat-reserved').textContent = data.reservedSeats;
            document.getElementById('stat-occupied').textContent = data.occupiedSeats;

            var grid = document.getElementById('seat-grid');
            grid.innerHTML = '';
            var seats = data.seats || [];
            var seatsByRow = {};
            seats.forEach(function(s) {
              if (!seatsByRow[s.rowNumber]) seatsByRow[s.rowNumber] = [];
              seatsByRow[s.rowNumber].push(s);
            });

            Object.keys(seatsByRow).sort(function(a,b){return a-b;}).forEach(function(rowNum) {
              var rowDiv = document.createElement('div');
              rowDiv.className = 'flex gap-1.5';
              seatsByRow[rowNum].forEach(function(seat) {
                var btn = document.createElement('button');
                btn.className = 'w-9 h-9 rounded text-xs font-medium transition-all flex items-center justify-center';
                var sc = statusColors[seat.status] || statusColors['UNAVAILABLE'];
                btn.style.cssText = 'background:' + sc.bg + ';color:' + sc.text + ';border:none;cursor:pointer;';
                btn.textContent = seat.seatCode;
                btn.title = seat.seatCode + ' - ' + seatStatusMap[seat.status];
                if (seat.status === 'AVAILABLE') {
                  btn.onclick = function() { selectSeat(seat); };
                }
                rowDiv.appendChild(btn);
              });
              grid.appendChild(rowDiv);
            });
          }).catch(function(err) {
            console.error('座位状态加载失败:', err);
            document.getElementById('seat-loading').textContent = '加载失败: ' + (err.message || '未知错误');
          });
      }

      function selectSeat(seat) {
        selectedSeat = seat;
        document.getElementById('seat-detail').classList.remove('hidden');
        document.getElementById('detail-code').textContent = seat.seatCode;
        var st = statusColors[seat.status] || statusColors['UNAVAILABLE'];
        document.getElementById('detail-status').innerHTML = '<span style="color:' + st.bg + ';font-weight:600;">' + seatStatusMap[seat.status] + '</span>';
        var tagText = (seat.tags || []).join('、') || '无特殊标签';
        document.getElementById('detail-tags').textContent = '标签：' + tagText;
        document.getElementById('detail-date').textContent = selectedDate;
        // 显示选中时段范围
        if (selectedSlots.length > 1) {
          document.getElementById('detail-slot').textContent = selectedSlots[0].startTime + ' - ' + selectedSlots[selectedSlots.length - 1].endTime + '（' + selectedSlots.length + '个时段）';
        } else {
          document.getElementById('detail-slot').textContent = selectedSlots[0].startTime + ' - ' + selectedSlots[0].endTime;
        }
      }

      window.makeReservation = function() {
        if (!selectedSeat || selectedSlots.length === 0 || !selectedDate) {
          Utils.showToast('请选择座位和时段', 'warning');
          return;
        }

        // 多时段合并为一个连续预约（后端按单条记录处理）
        var firstSlot = selectedSlots[0];
        var lastSlot = selectedSlots[selectedSlots.length - 1];
        var requestData = {
          seatId: selectedSeat.seatId,
          startTime: selectedDate + ' ' + firstSlot.startTime + ':00',
          endTime: selectedDate + ' ' + lastSlot.endTime + ':00'
        };

        ReservationAPI.createReservation(requestData).then(function() {
          var slotDesc = selectedSlots.length > 1
            ? firstSlot.startTime + '-' + lastSlot.endTime + '（' + selectedSlots.length + '个时段合并）'
            : firstSlot.startTime + '-' + firstSlot.endTime;
          Utils.showToast('预约成功！' + slotDesc, 'success');
          loadSeatsByTime();
          document.getElementById('seat-detail').classList.add('hidden');
        }).catch(function(err) {
          Utils.showToast(err.message || '预约失败', 'error');
        });
      };

      // ========== 初始化 ==========
      // 如果URL带了roomId，直接进入座位选择
      var urlParams = new URLSearchParams(window.location.search);
      var roomIdFromUrl = urlParams.get('roomId');
      if (roomIdFromUrl) {
        enterSeatSelection(Number(roomIdFromUrl));
      } else {
        searchRooms(1);
      }
    })();
  </script>
</body>
</html>
