<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时看板 - 智约自习</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style type="text/tailwindcss">
    @theme inline { --color-primary: var(--brand-primary); }
    @layer base {
      body { background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font-family); }
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--color-bg-secondary);">
  <div id="navbar-placeholder"></div>

  <main class="mx-auto px-4 sm:px-6 py-6" style="max-width: var(--max-width);">
    <div class="flex items-center gap-3 mb-4">
      <a href="home.html" class="flex items-center gap-1 text-sm transition-colors" style="color:var(--brand-primary);text-decoration:none;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 返回首页
      </a>
      <span class="text-sm" style="color:var(--color-text-tertiary);">/</span>
      <h1 class="text-xl font-bold">实时看板</h1>
      <span class="ml-auto text-xs flex items-center gap-1" style="color:var(--color-text-tertiary);">
        <i data-lucide="refresh-cw" style="width:12px;height:12px;"></i> 每30秒自动刷新
      </span>
    </div>

    <!-- 校区概览 -->
    <div id="campus-loading" class="py-8 text-center text-sm mb-4" style="color:var(--color-text-tertiary);">加载中...</div>
    <div id="campus-overview" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 hidden"></div>

    <!-- 楼栋概览 -->
    <div class="rounded-xl p-5 mb-6" style="background: var(--surface-card); border: var(--surface-card-border);">
      <h2 class="font-semibold text-base mb-4 flex items-center gap-2">
        <i data-lucide="building" style="width:18px;height:18px;color:var(--brand-primary);"></i>
        楼栋概览
      </h2>
      <div id="building-loading" class="py-4 text-center text-sm" style="color:var(--color-text-tertiary);">加载中...</div>
      <div id="building-list" class="space-y-3 hidden"></div>
    </div>

    <!-- 自习室详情 -->
    <div class="rounded-xl p-5" style="background: var(--surface-card); border: var(--surface-card-border);">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <h2 class="font-semibold text-base flex items-center gap-2">
          <i data-lucide="layout-grid" style="width:18px;height:18px;color:var(--brand-primary);"></i>
          自习室座位实况
        </h2>
        <select id="room-select" class="px-3 py-2 rounded-md text-sm outline-none"
                style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <option value="">选择自习室</option>
        </select>
      </div>
      <div id="room-detail-loading" class="py-4 text-center text-sm hidden" style="color:var(--color-text-tertiary);">加载中...</div>
      <div id="room-detail" class="hidden">
        <div class="flex items-center gap-4 mb-4 text-xs flex-wrap">
          <span>总座位: <strong id="detail-total">0</strong></span>
          <span style="color:var(--seat-available);">空闲: <strong id="detail-available">0</strong></span>
          <span style="color:var(--seat-reserved);">已预约: <strong id="detail-reserved">0</strong></span>
          <span style="color:var(--seat-occupied);">使用中: <strong id="detail-occupied">0</strong></span>
        </div>
        <div class="flex flex-col items-center gap-1" id="detail-grid"></div>
      </div>
      <div id="room-detail-empty" class="py-8 text-center">
        <i data-lucide="mouse-pointer-click" style="width:32px;height:32px;color:var(--color-text-tertiary);margin:0 auto 8px;"></i>
        <p class="text-sm" style="color:var(--color-text-tertiary);">请选择自习室查看座位实况</p>
      </div>
    </div>
  </main>

  <script src="../../public/js/config.js"></script>
  <script src="../../public/js/utils.js"></script>
  <script src="../../public/js/request.js"></script>
  <script src="../../public/api/space.js"></script>
  <script src="../../public/api/dashboard.js"></script>
  <script src="../../public/js/navbar.js"></script>

  <script>
    (function() {
      'use strict';

      if (!Utils.requireRole(['STUDENT'])) return;

      fetch('../partials/navbar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('navbar-placeholder').innerHTML = html;
          if (window.initNavbarUI) initNavbarUI();
          lucide.createIcons();
        });

      var statusColors = {
        'AVAILABLE': 'var(--seat-available)',
        'RESERVED': 'var(--seat-reserved)',
        'OCCUPIED': 'var(--seat-occupied)',
        'TEMPORARY_LEAVE': 'var(--seat-away)',
        'UNAVAILABLE': 'var(--color-border)'
      };

      function loadCampusOverview() {
        DashboardAPI.getCampusOverview()
          .catch(function () { return []; })
          .then(function(list) {
          document.getElementById('campus-loading').classList.add('hidden');
          var container = document.getElementById('campus-overview');
          container.classList.remove('hidden');
          container.innerHTML = '';
          if (!list.length) {
            container.innerHTML = '<div class="text-sm text-center py-4" style="color:var(--color-text-tertiary);">暂无校区概览数据</div>';
            return;
          }
          list.forEach(function(c) {
            var el = document.createElement('div');
            el.className = 'rounded-xl p-5';
            el.style.cssText = 'background:var(--surface-card);border:var(--surface-card-border);';
            el.innerHTML =
              '<div class="flex items-center justify-between mb-3">' +
                '<h3 class="font-semibold text-sm">' + Utils.escapeHtml(c.campusName) + '</h3>' +
                '<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--brand-primary-lighter);color:var(--brand-primary);">使用率 ' + c.usageRate + '%</span>' +
              '</div>' +
              '<div class="grid grid-cols-3 gap-2 text-center">' +
                '<div class="rounded-lg p-2" style="background:var(--color-bg-secondary);">' +
                  '<div class="text-lg font-semibold" style="color:var(--brand-primary);">' + c.totalRooms + '</div>' +
                  '<div class="text-xs" style="color:var(--color-text-tertiary);">自习室</div>' +
                '</div>' +
                '<div class="rounded-lg p-2" style="background:var(--color-bg-secondary);">' +
                  '<div class="text-lg font-semibold" style="color:var(--brand-primary);">' + c.totalSeats + '</div>' +
                  '<div class="text-xs" style="color:var(--color-text-tertiary);">总座位</div>' +
                '</div>' +
                '<div class="rounded-lg p-2" style="background:var(--color-bg-secondary);">' +
                  '<div class="text-lg font-semibold" style="color:var(--state-success);">' + c.availableSeats + '</div>' +
                  '<div class="text-xs" style="color:var(--color-text-tertiary);">可用</div>' +
                '</div>' +
              '</div>';
            container.appendChild(el);
          });
          lucide.createIcons();
        }).catch(function() {
          document.getElementById('campus-loading').classList.add('hidden');
        });
      }

      function loadBuildingOverview() {
        DashboardAPI.getBuildingOverview()
          .catch(function () { return []; })
          .then(function(list) {
          document.getElementById('building-loading').classList.add('hidden');
          var container = document.getElementById('building-list');
          container.classList.remove('hidden');
          container.innerHTML = '';
          if (!list.length) {
            container.innerHTML = '<div class="text-sm text-center py-4" style="color:var(--color-text-tertiary);">暂无楼栋概览数据</div>';
            return;
          }
          list.forEach(function(b) {
            var el = document.createElement('div');
            el.className = 'rounded-lg p-3 flex items-center justify-between flex-wrap gap-2';
            el.style.cssText = 'background:var(--color-bg-secondary);';
            var usageWidth = Math.min(b.usageRate, 100);
            el.innerHTML =
              '<div class="flex-1">' +
                '<div class="flex items-center gap-2 mb-1">' +
                  '<span class="font-medium text-sm">' + Utils.escapeHtml(b.buildingName) + '</span>' +
                  '<span class="text-xs" style="color:var(--color-text-tertiary);">' + Utils.escapeHtml(b.campusName) + '</span>' +
                '</div>' +
                '<div class="w-full h-1.5 rounded-full overflow-hidden" style="background:var(--color-bg-tertiary);">' +
                  '<div class="h-full rounded-full transition-all" style="width:' + usageWidth + '%;background:var(--brand-primary);"></div>' +
                '</div>' +
              '</div>' +
              '<div class="flex items-center gap-3 text-xs" style="color:var(--color-text-secondary);">' +
                '<span>总 ' + b.totalSeats + ' 座</span>' +
                '<span style="color:var(--state-success);">可用 ' + b.availableSeats + '</span>' +
                '<span class="font-medium" style="color:var(--brand-primary);">' + b.usageRate + '%</span>' +
              '</div>';
            container.appendChild(el);
          });
        }).catch(function() {
          document.getElementById('building-loading').classList.add('hidden');
        });
      }

      function loadRoomList() {
        SpaceAPI.getRooms({ pageSize: 100 })
          .catch(function () { return { records: [], list: [] }; })
          .then(function(result) {
          var sel = document.getElementById('room-select');
          sel.innerHTML = '<option value="">选择自习室</option>';
          var list = result.records || result.list || [];
          list.forEach(function(r) {
            var opt = document.createElement('option');
            opt.value = r.id; opt.textContent = r.name;
            sel.appendChild(opt);
          });
          sel.addEventListener('change', function() {
            if (this.value) loadRoomDetail(Number(this.value));
          });
        });
      }

      function loadRoomDetail(roomId) {
        document.getElementById('room-detail-empty').classList.add('hidden');
        document.getElementById('room-detail').classList.add('hidden');
        document.getElementById('room-detail-loading').classList.remove('hidden');

        DashboardAPI.getRoomDetail(roomId).then(function(data) {
          document.getElementById('room-detail-loading').classList.add('hidden');
          document.getElementById('room-detail').classList.remove('hidden');
          document.getElementById('detail-total').textContent = data.totalSeats;
          document.getElementById('detail-available').textContent = data.availableSeats;
          document.getElementById('detail-reserved').textContent = data.reservedSeats;
          document.getElementById('detail-occupied').textContent = data.occupiedSeats;

          var grid = document.getElementById('detail-grid');
          grid.innerHTML = '<div class="text-xs mb-2" style="color:var(--color-text-tertiary);">讲台</div>';
          var seatsByRow = {};
          (data.seats || []).forEach(function(s) {
            if (!seatsByRow[s.rowNumber]) seatsByRow[s.rowNumber] = [];
            seatsByRow[s.rowNumber].push(s);
          });
          Object.keys(seatsByRow).sort(function(a,b){return a-b;}).forEach(function(rowNum) {
            var rowDiv = document.createElement('div');
            rowDiv.className = 'flex gap-1';
            seatsByRow[rowNum].forEach(function(seat) {
              var span = document.createElement('span');
              span.className = 'w-7 h-7 rounded-sm text-[10px] flex items-center justify-center';
              var color = statusColors[seat.status] || statusColors['UNAVAILABLE'];
              span.style.cssText = 'background:' + color + ';color:#fff;';
              span.textContent = seat.seatCode.split('-')[1];
              span.title = seat.seatCode + ' - ' + (seat.status === 'AVAILABLE' ? '空闲' : seat.status === 'RESERVED' ? '已预约' : seat.status === 'OCCUPIED' ? '使用中' : seat.status === 'TEMPORARY_LEAVE' ? '暂离' : '不可用');
              rowDiv.appendChild(span);
            });
            grid.appendChild(rowDiv);
          });
        }).catch(function() {
          document.getElementById('room-detail-loading').textContent = '加载失败';
        });
      }

      // 加载所有数据
      loadCampusOverview();
      loadBuildingOverview();
      loadRoomList();

      // 自动刷新
      setInterval(function() {
        loadCampusOverview();
        loadBuildingOverview();
        var sel = document.getElementById('room-select');
        if (sel.value) loadRoomDetail(Number(sel.value));
      }, AppConfig.dashboardRefreshInterval || 30000);
    })();
  </script>
</body>
</html>
