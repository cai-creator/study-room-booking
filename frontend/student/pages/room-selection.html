<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自习室选择 - 智约自习</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style type="text/tailwindcss">
    @theme inline { --color-primary: var(--brand-primary); }
    @layer base {
      body { background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font-family); }
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--color-bg-secondary);">
  <div id="navbar-placeholder"></div>

  <main class="mx-auto px-4 sm:px-6 py-6" style="max-width: var(--max-width);">
    <div class="flex items-center gap-3 mb-4">
      <a href="home.html" class="flex items-center gap-1 text-sm transition-colors" style="color:var(--brand-primary);text-decoration:none;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> 返回首页
      </a>
      <span class="text-sm" style="color:var(--color-text-tertiary);">/</span>
      <h1 class="text-xl font-bold">自习室选择</h1>
    </div>

    <!-- 筛选栏 -->
    <div class="rounded-xl p-4 mb-4" style="background: var(--surface-card); border: var(--surface-card-border);">
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
        <select id="filter-campus" class="px-3 py-2 rounded-md text-sm outline-none"
                style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <option value="">全部校区</option>
        </select>
        <select id="filter-building" class="px-3 py-2 rounded-md text-sm outline-none"
                style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <option value="">全部楼栋</option>
        </select>
        <select id="filter-floor" class="px-3 py-2 rounded-md text-sm outline-none"
                style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <option value="">全部楼层</option>
        </select>
        <select id="filter-type" class="px-3 py-2 rounded-md text-sm outline-none"
                style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <option value="">全部类型</option>
          <option value="SELF_STUDY_ROOM">自习室</option>
          <option value="READING_ROOM">阅览室</option>
          <option value="COMPUTER_ROOM">电子阅览室</option>
          <option value="GROUP_ROOM">研讨间</option>
        </select>
        <div class="flex items-center gap-2 col-span-2 md:col-span-1">
          <input type="checkbox" id="filter-available" class="w-4 h-4 rounded" style="accent-color:var(--brand-primary);">
          <label for="filter-available" class="text-sm" style="color:var(--color-text-secondary);">仅看有空座</label>
        </div>
        <div class="col-span-2 md:col-span-2 lg:col-span-1 flex gap-2">
          <input type="text" id="filter-keyword" placeholder="搜索自习室..."
                 class="flex-1 px-3 py-2 rounded-md text-sm outline-none"
                 style="border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text-primary);">
          <button onclick="searchRooms()" class="px-4 py-2 rounded-md text-sm font-medium text-white"
                  style="background:var(--brand-primary);">搜索</button>
        </div>
      </div>
    </div>

    <!-- 列表 -->
    <div id="rooms-loading" class="py-12 text-center text-sm" style="color:var(--color-text-tertiary);">加载中...</div>
    <div id="rooms-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
    <div id="rooms-empty" class="hidden py-12 text-center">
      <i data-lucide="search-x" style="width:40px;height:40px;color:var(--color-text-tertiary);margin:0 auto 8px;"></i>
      <p class="text-sm" style="color:var(--color-text-tertiary);">未找到符合条件的自习室</p>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="hidden mt-6 flex items-center justify-center gap-2"></div>
  </main>

  <script src="../../public/js/config.js"></script>
  <script src="../../public/js/utils.js"></script>
  <script src="../../public/js/request.js"></script>
  <script src="../../public/api/space.js"></script>
  <script src="../../public/js/student-navbar.js"></script>

  <script>
    (function() {
      'use strict';

      fetch('../partials/navbar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('navbar-placeholder').innerHTML = html;
          if (window.initStudentNavbarUI) initStudentNavbarUI();
          lucide.createIcons();
        });

      var currentPage = 1;
      var campuses = [], buildings = [], floors = [];
      var typeNames = { 'READING_ROOM': '阅览室', 'SELF_STUDY_ROOM': '自习室', 'COMPUTER_ROOM': '电子阅览室', 'GROUP_ROOM': '研讨间' };

      // 加载校区
      SpaceAPI.getCampuses().then(function(list) {
        campuses = list || [];
        var sel = document.getElementById('filter-campus');
        campuses.forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name;
          sel.appendChild(opt);
        });
      });

      // 加载楼栋
      SpaceAPI.getBuildings().then(function(list) {
        buildings = list || [];
      });

      // 校区变化加载楼栋
      document.getElementById('filter-campus').addEventListener('change', function() {
        var cid = this.value;
        var sel = document.getElementById('filter-building');
        sel.innerHTML = '<option value="">全部楼栋</option>';
        document.getElementById('filter-floor').innerHTML = '<option value="">全部楼层</option>';
        if (!cid) return;
        SpaceAPI.getBuildings({ campusId: cid }).then(function(list) {
          (list || []).forEach(function(b) {
            var opt = document.createElement('option');
            opt.value = b.id; opt.textContent = b.name;
            sel.appendChild(opt);
          });
        });
      });

      // 楼栋变化加载楼层
      document.getElementById('filter-building').addEventListener('change', function() {
        var bid = this.value;
        var sel = document.getElementById('filter-floor');
        sel.innerHTML = '<option value="">全部楼层</option>';
        if (!bid) return;
        SpaceAPI.getFloors(bid).then(function(list) {
          (list || []).forEach(function(f) {
            var opt = document.createElement('option');
            opt.value = f.id; opt.textContent = f.floorNumber + '层';
            sel.appendChild(opt);
          });
        });
      });

      window.searchRooms = function(page) {
        currentPage = page || 1;
        var params = { pageNum: currentPage, pageSize: 9 };
        var campusId = document.getElementById('filter-campus').value;
        var buildingId = document.getElementById('filter-building').value;
        var floorId = document.getElementById('filter-floor').value;
        var roomType = document.getElementById('filter-type').value;
        var hasAvailable = document.getElementById('filter-available').checked;
        var keyword = document.getElementById('filter-keyword').value.trim();

        if (campusId) params.campusId = campusId;
        if (buildingId) params.buildingId = buildingId;
        if (floorId) params.floorId = floorId;
        if (roomType) params.roomType = roomType;
        if (hasAvailable) params.hasAvailableSeats = true;
        if (keyword) params.keyword = keyword;

        document.getElementById('rooms-loading').classList.remove('hidden');
        document.getElementById('rooms-list').classList.add('hidden');
        document.getElementById('rooms-empty').classList.add('hidden');
        document.getElementById('pagination').classList.add('hidden');

        SpaceAPI.getRooms(params).then(function(result) {
          document.getElementById('rooms-loading').classList.add('hidden');
          var list = result.records || result.list || [];
          if (list.length === 0) {
            document.getElementById('rooms-empty').classList.remove('hidden');
            lucide.createIcons();
            return;
          }
          var container = document.getElementById('rooms-list');
          container.innerHTML = '';
          container.classList.remove('hidden');
          list.forEach(function(room) {
            var el = document.createElement('div');
            el.className = 'rounded-xl p-5 transition-all hover:shadow-lg';
            el.style.cssText = 'background:var(--surface-card);border:var(--surface-card-border);';
            var availableCount = room.availableSeats != null ? room.availableSeats : (room.totalSeats ? Math.floor(room.totalSeats * 0.4) : 0);
            var statusBadge = (room.hasAvailable || availableCount > 0)
              ? '<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--state-success-bg);color:var(--state-success);">有空座</span>'
              : '<span class="text-xs px-2 py-0.5 rounded-full" style="background:var(--seat-occupied-bg);color:var(--seat-occupied);">已满</span>';
            el.innerHTML =
              '<div class="flex items-start justify-between mb-3">' +
                '<div>' +
                  '<h3 class="font-semibold text-sm mb-1">' + Utils.escapeHtml(room.name) + '</h3>' +
                  '<p class="text-xs" style="color:var(--color-text-tertiary);">' + Utils.escapeHtml(room.campusName || '') + ' · ' + Utils.escapeHtml(room.buildingName || '') + ' · ' + (room.floorNumber || '') + '层</p>' +
                '</div>' +
                statusBadge +
              '</div>' +
              '<div class="flex items-center gap-4 text-xs mb-4" style="color:var(--color-text-secondary);">' +
                '<span><i data-lucide="users" class="inline" style="width:12px;height:12px;"></i> ' + room.totalSeats + '座</span>' +
                '<span><i data-lucide="layout-grid" class="inline" style="width:12px;height:12px;"></i> ' + room.rowsCount + '×' + room.colsCount + '</span>' +
                '<span class="px-2 py-0.5 rounded-full" style="background:var(--color-bg-tertiary);">' + (typeNames[room.roomType] || room.roomType) + '</span>' +
              '</div>' +
              '<a href="seat-selection.html?roomId=' + room.id + '" class="block text-center py-2 rounded-md text-sm font-medium transition-all" ' +
                 'style="background:var(--brand-primary);color:var(--color-text-inverse);text-decoration:none;">进入选座</a>';
            container.appendChild(el);
          });
          renderPagination(result.total || 0, result.current || result.pageNum || 1, result.size || result.pageSize || 9);
          lucide.createIcons();
        }).catch(function() {
          document.getElementById('rooms-loading').textContent = '加载失败，请重试';
        });
      };

      function renderPagination(total, pageNum, pageSize) {
        var totalPages = Math.ceil(total / pageSize);
        if (totalPages <= 1) return;
        var container = document.getElementById('pagination');
        container.innerHTML = '';
        container.classList.remove('hidden');
        for (var i = 1; i <= totalPages; i++) {
          var btn = document.createElement('button');
          btn.textContent = i;
          btn.className = 'w-8 h-8 rounded-md text-sm font-medium transition-all';
          if (i === pageNum) {
            btn.style.cssText = 'background:var(--brand-primary);color:var(--color-text-inverse);';
          } else {
            btn.style.cssText = 'background:var(--color-bg);color:var(--color-text-secondary);border:1px solid var(--color-border);';
          }
          btn.onclick = (function(p) { return function() { window.searchRooms(p); }; })(i);
          container.appendChild(btn);
        }
      }

      // 初始加载
      window.searchRooms(1);
    })();
  </script>
</body>
</html>
