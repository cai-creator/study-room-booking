<!--
  学生端导航栏
  高校自习室智能预约系统
  通过 fetch 加载到各页面的 #navbar-placeholder 中
-->
<nav class="sticky top-0 z-50 border-b" style="height: var(--header-height); background: var(--color-surface); border-color: var(--color-border);">
  <div class="h-full max-w-[1280px] mx-auto px-4 sm:px-6 flex items-center justify-between" style="max-width: var(--max-width);">

    <!-- 左侧：Logo + 导航 -->
    <div class="flex items-center gap-6">
      <!-- Logo -->
      <a href="home.html" class="flex items-center gap-2 no-underline" style="color: var(--brand-primary);">
        <i data-lucide="book-open" style="width: 22px; height: 22px;"></i>
        <span style="font-size: var(--text-lg); font-weight: 700; color: var(--color-text-primary);">智约自习</span>
      </a>

      <!-- 导航链接 -->
      <div class="hidden md:flex items-center gap-1" id="nav-links">
        <a href="home.html" class="nav-link px-3 py-2 rounded-md text-sm font-medium transition-colors" data-page="home.html">首页</a>
        <a href="seat-selection.html" class="nav-link px-3 py-2 rounded-md text-sm font-medium transition-colors" data-page="seat-selection.html">座位预约</a>
        <a href="my-reservations.html" class="nav-link px-3 py-2 rounded-md text-sm font-medium transition-colors" data-page="my-reservations.html">我的预约</a>
        <a href="dashboard.html" class="nav-link px-3 py-2 rounded-md text-sm font-medium transition-colors" data-page="dashboard.html">实时看板</a>
      </div>
    </div>

    <!-- 右侧：用户信息 -->
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 cursor-pointer relative" id="user-menu-trigger" onclick="toggleUserMenu()">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold" style="background: var(--brand-primary-lighter); color: var(--brand-primary);">
          <span id="navbar-user-avatar">U</span>
        </div>
        <span class="hidden sm:block text-sm font-medium" id="navbar-user-name" style="color: var(--color-text-primary);">用户</span>
        <i data-lucide="chevron-down" style="width: 14px; height: 14px; color: var(--color-text-tertiary);"></i>
      </div>

      <!-- 下拉菜单 -->
      <div id="user-dropdown" class="hidden absolute right-4 top-14 w-48 rounded-lg py-1" style="background: var(--surface-card); border: var(--surface-card-border); box-shadow: var(--shadow-lg); z-index: var(--z-dropdown);">
        <div class="px-4 py-2 border-b" style="border-color: var(--color-border);">
          <p class="text-sm font-medium" style="color: var(--color-text-primary);" id="dropdown-name"></p>
          <p style="font-size: var(--text-xs); color: var(--color-text-tertiary);" id="dropdown-role"></p>
        </div>
        <a href="../../public/settings.html" class="w-full text-left px-4 py-2 text-sm transition-colors flex items-center gap-2 no-underline" style="color: var(--color-text-primary);display:flex;">
          <i data-lucide="settings" style="width: 15px; height: 15px;"></i> 设置
        </a>
        <button onclick="handleLogout()" class="w-full text-left px-4 py-2 text-sm transition-colors flex items-center gap-2" style="color: var(--state-error);">
          <i data-lucide="log-out" style="width: 15px; height: 15px;"></i> 退出登录
        </button>
      </div>
    </div>

    <!-- 移动端汉堡菜单按钮 -->
    <button class="md:hidden p-2" onclick="toggleMobileMenu()" style="color: var(--color-text-secondary);">
      <i data-lucide="menu" style="width: 22px; height: 22px;"></i>
    </button>
  </div>

  <!-- 移动端菜单 -->
  <div id="mobile-menu" class="hidden md:hidden border-t" style="background: var(--color-surface); border-color: var(--color-border);">
    <a href="home.html" class="block px-6 py-3 text-sm font-medium nav-link" data-page="home.html">首页</a>
    <a href="seat-selection.html" class="block px-6 py-3 text-sm font-medium nav-link" data-page="seat-selection.html">座位预约</a>
    <a href="my-reservations.html" class="block px-6 py-3 text-sm font-medium nav-link" data-page="my-reservations.html">我的预约</a>
    <a href="dashboard.html" class="block px-6 py-3 text-sm font-medium nav-link" data-page="dashboard.html">实时看板</a>
  </div>
</nav>

<!--
  脚本已抽取到 ../../public/js/navbar.js（管理端学生端共用）
  页面步骤：
  1) <script src="../../public/js/navbar.js"></script>  引入脚本（全局注册 toggleUserMenu / handleLogout）
  2) fetch('../partials/navbar.html') 填充 innerHTML 后调用 initNavbarUI() 填充用户信息+高亮菜单
-->
